<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MV Genset Monitoring</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      color: #f8fafc;
      background-color: #060410;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(232, 164, 200, 0.08) 0%, transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
      background-attachment: fixed;
    }

    .landing-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3.5rem;
      padding: 2rem;
    }

    .landing-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .landing-icon {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(232, 164, 200, 0.08);
      border: 1px solid rgba(232, 164, 200, 0.2);
      color: #E8A4C8;
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .landing-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #f0f0f5;
    }

    .landing-subtitle {
      font-size: 0.95rem;
      color: rgba(200, 180, 195, 0.6);
      font-weight: 400;
    }

    .nav-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      width: 100%;
      max-width: 36rem;
    }

    @media (min-width: 640px) {
      .nav-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem 1.5rem 1.75rem;
      border-radius: 1.25rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .nav-card:hover {
      transform: translateY(-4px);
    }

    .nav-card--genset {
      background: linear-gradient(180deg, rgba(18, 12, 26, 0.95), rgba(8, 5, 14, 0.98));
      border: 1px solid rgba(232, 164, 200, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(232, 164, 200, 0);
    }

    .nav-card--genset:hover {
      border-color: rgba(232, 164, 200, 0.5);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 40px rgba(232, 164, 200, 0.08);
    }

    .nav-card--breaker {
      background: linear-gradient(180deg, rgba(12, 18, 30, 0.95), rgba(6, 10, 20, 0.98));
      border: 1px solid rgba(16, 185, 129, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 0 rgba(16, 185, 129, 0);
    }

    .nav-card--breaker:hover {
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 40px rgba(16, 185, 129, 0.08);
    }

    .nav-card-icon {
      width: 3.5rem;
      height: 3.5rem;
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .nav-card--genset .nav-card-icon {
      background: rgba(232, 164, 200, 0.1);
      border: 1px solid rgba(232, 164, 200, 0.25);
      color: #F0C4DD;
    }

    .nav-card--breaker .nav-card-icon {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: #34d399;
    }

    .nav-card-label {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .nav-card--genset .nav-card-label { color: #F0C4DD; }
    .nav-card--breaker .nav-card-label { color: #34d399; }

    .nav-card-desc {
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.45;
      margin-top: -0.5rem;
    }

    .nav-card--genset .nav-card-desc { color: rgba(232, 164, 200, 0.5); }
    .nav-card--breaker .nav-card-desc { color: rgba(52, 211, 153, 0.5); }

    .nav-card-arrow {
      font-size: 0.85rem;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
    }

    .nav-card:hover .nav-card-arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    .nav-card--genset .nav-card-arrow { color: #E8A4C8; }
    .nav-card--breaker .nav-card-arrow { color: #34d399; }
  </style>
</head>
<body>
  <div class="landing-container">
    <div class="landing-header">
      <div class="landing-icon">
        <i class="fa-solid fa-bolt"></i>
      </div>
      <div class="landing-title">MV Genset Monitoring</div>
      <div class="landing-subtitle">Select a panel to view</div>
    </div>

    <div class="nav-grid">
      <a href="/mv-genset.html" class="nav-card nav-card--genset">
        <div class="nav-card-icon"><i class="fa-solid fa-industry"></i></div>
        <div class="nav-card-label">MV Genset</div>
        <div class="nav-card-desc">Generator overview, diagnostics & operator panel</div>
        <div class="nav-card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>

      <a href="/mv-breaker-gcb.html" class="nav-card nav-card--breaker">
        <div class="nav-card-icon"><i class="fa-solid fa-toggle-on"></i></div>
        <div class="nav-card-label">MV Breaker - Genset GCB</div>
        <div class="nav-card-desc">GCB-SEL-751 breaker status, protection & metering</div>
        <div class="nav-card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>
    </div>
  </div>
</body>
</html>
